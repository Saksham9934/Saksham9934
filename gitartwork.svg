<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saksham - Coder Animation</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #111827, #020617 70%);
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
      position: relative;
    }

    .bg-grid {
      position: absolute;
      width: 200%;
      height: 200%;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: rotate(10deg);
      animation: moveGrid 20s linear infinite;
    }

    @keyframes moveGrid {
      from {
        transform: translateY(0) rotate(10deg);
      }
      to {
        transform: translateY(-100px) rotate(10deg);
      }
    }

    .container {
      position: relative;
      text-align: center;
      z-index: 2;
      padding: 40px;
      border-radius: 30px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 40px rgba(0,255,170,0.15);
    }

    .coder {
      font-size: 22px;
      color: #00ffcc;
      letter-spacing: 6px;
      margin-bottom: 15px;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0.5;
      }
    }

    h1 {
      font-size: 90px;
      font-weight: 900;
      letter-spacing: 10px;
      background: linear-gradient(90deg, #00f5ff, #00ff95, #00f5ff);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 5s linear infinite;
      text-shadow: 0 0 25px rgba(0,255,200,0.4);
    }

    @keyframes shine {
      0% {
        background-position: 0%;
      }
      100% {
        background-position: 300%;
      }
    }

    .typing {
      color: #94a3b8;
      margin-top: 18px;
      font-size: 20px;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid #00ffcc;
      width: 0;
      animation: typing 5s steps(40) infinite alternate,
                 cursor 0.8s infinite;
    }

    @keyframes typing {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }

    @keyframes cursor {
      50% {
        border-color: transparent;
      }
    }

    .grid {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(25, 14px);
      gap: 6px;
      justify-content: center;
    }

    .box {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      background: #0f172a;
      animation: pulse 3s infinite ease-in-out;
      box-shadow: 0 0 5px rgba(0,255,150,0.2);
    }

    .box:nth-child(odd) {
      animation-delay: 0.3s;
    }

    .box:nth-child(3n) {
      animation-delay: 0.8s;
    }

    .box:nth-child(5n) {
      animation-delay: 1.2s;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        background: #0f172a;
      }
      50% {
        transform: scale(1.5) rotate(180deg);
        background: #00ff99;
        box-shadow: 0 0 15px #00ff99;
      }
      100% {
        transform: scale(1);
        background: #2563eb;
      }
    }

    .floating {
      position: absolute;
      color: rgba(0,255,200,0.2);
      font-size: 20px;
      animation: float 10s linear infinite;
      user-select: none;
    }

    @keyframes float {
      from {
        transform: translateY(100vh) rotate(0deg);
      }
      to {
        transform: translateY(-120vh) rotate(360deg);
      }
    }

    .footer {
      margin-top: 35px;
      color: #00ffcc;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>

  <div class="floating" style="left:10%; animation-duration:12s;">&lt;/&gt;</div>
  <div class="floating" style="left:25%; animation-duration:16s;">{ }</div>
  <div class="floating" style="left:40%; animation-duration:10s;">console.log()</div>
  <div class="floating" style="left:60%; animation-duration:14s;">#include</div>
  <div class="floating" style="left:80%; animation-duration:18s;">function()</div>

  <div class="container">

    <div class="coder">FULL STACK CODER</div>

    <h1>SAKSHAM</h1>

    <div class="typing">
      Passionate Developer • Creative Programmer • Future Software Engineer
    </div>

    <div class="grid" id="grid"></div>

    <div class="footer">
      Building The Future With Code ⚡
    </div>
  </div>

  <script>
    const grid = document.getElementById('grid');

    for (let i = 0; i < 375; i++) {
      const box = document.createElement('div');
      box.classList.add('box');
      grid.appendChild(box);
    }
  </script>

</body>
</html>
